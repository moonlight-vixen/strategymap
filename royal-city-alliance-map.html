<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Royal City</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#132420">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Royal City">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">

<style>
  *{box-sizing:border-box;}
  html{ -webkit-text-size-adjust:100%; text-size-adjust:100%; }
  html, body{ height:100%; margin:0; }
  body{
    background:#0d1210;
    font-family:'Century Gothic','CenturyGothic','Apple Gothic','Futura','Trebuchet MS',sans-serif;
    color:#f4efe4;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  a{ color:inherit; text-decoration:none; }

  .home-wrap{
    width:100%; max-width:420px;
  }
  .crest{
    display:flex; flex-direction:column; align-items:center; margin-bottom:28px;
  }
  .crest img{ width:64px; height:auto; margin-bottom:10px; }
  .crest h1{
    font-size:26px; font-weight:400; letter-spacing:2px; color:#e8c77a; margin:0;
    text-transform:uppercase;
  }
  .crest p{
    font-size:12.5px; color:#9c9488; margin:6px 0 0; letter-spacing:.3px;
  }

  .home-btn{
    display:block; width:100%; text-align:center;
    padding:16px 18px; margin-bottom:12px;
    border-radius:10px; border:1px solid #7a6635; background:transparent;
    color:#e8c77a; font-family:inherit; font-size:17px; font-weight:700;
    letter-spacing:.4px; cursor:pointer; transition:all .15s ease;
  }
  .home-btn:hover{ background:#4a3d1f; color:#fff; }
  .home-btn.primary{
    background:#e8c77a; color:#2a2416; border-color:#e8c77a;
    font-size:18px; padding:18px;
  }
  .home-btn.primary:hover{ background:#f2d691; }

  .section-divider{
    height:1px; background:#2a3f37; margin:22px 0 16px;
  }
  .section-label{
    font-size:11px; color:#6b6355; text-transform:uppercase; letter-spacing:1px;
    font-weight:700; margin:0 0 12px 2px;
  }
  .update-btn{
    display:block; width:100%; text-align:center; padding:12px 16px;
    border-radius:10px; border:1px solid #6b6355; background:transparent;
    color:#cbc3b5; font-family:inherit; font-size:13px; cursor:pointer; transition:all .15s ease;
  }
  .update-btn:hover{ background:#6b6355; color:#fff; }
  .update-msg{ font-size:11.5px; color:#9c9488; margin-top:8px; text-align:center; min-height:16px; }

</style>
</head>
<body>

<div class="home-wrap">
  <div class="crest">
    <h1>APEX</h1>
    <p>Last Asylum Alliance Strategy &amp; Reference Hub</p>
  </div>

  <a class="home-btn primary" href="territory-map.html">🗺️ Territory Map</a>

  <div class="section-divider"></div>
  <div class="section-label">Guides</div>
  <a class="home-btn" href="hero-guide.html">⚔️ Hero Guide</a>
  <a class="home-btn" href="sanctuary-upgrades.html">🏰 Sanctuary Guide</a>

  <div class="section-divider"></div>
  <button class="update-btn" id="checkUpdateBtn">⟳ Check for Updates</button>
  <div id="updateMsg" class="update-msg"></div>

</div>

<script>
let swRegistration = null;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then((reg) => { swRegistration = reg; })
      .catch((err) => {
        console.warn('Service worker registration failed (expected if opened via file://):', err);
      });
  });

  let reloadedOnce = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (reloadedOnce) return;
    reloadedOnce = true;
    window.location.reload();
  });
}

const checkUpdateBtn = document.getElementById('checkUpdateBtn');
const updateMsg = document.getElementById('updateMsg');

checkUpdateBtn.addEventListener('click', async () => {
  if (!('serviceWorker' in navigator)) {
    updateMsg.textContent = 'Not available in this browser';
    updateMsg.style.color = '#c0392b';
    return;
  }
  updateMsg.textContent = 'Checking…';
  updateMsg.style.color = '#9c9488';
  try {
    const reg = swRegistration || await navigator.serviceWorker.getRegistration();
    if (!reg) {
      updateMsg.textContent = 'No service worker registered yet';
      updateMsg.style.color = '#c0392b';
      return;
    }
    await reg.update();
    setTimeout(() => {
      if (reg.waiting) {
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        updateMsg.textContent = 'Update found — reloading…';
        updateMsg.style.color = '#2ecc71';
      } else {
        updateMsg.textContent = 'Already up to date ✓';
        updateMsg.style.color = '#2ecc71';
        setTimeout(() => { updateMsg.textContent = ''; }, 3000);
      }
    }, 1200);
  } catch (err) {
    updateMsg.textContent = 'Check failed — try again later';
    updateMsg.style.color = '#c0392b';
  }
});
</script>

</body>
</html>
